<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Registro de Abastecimento e Manutenção</title>

<style>
:root{
  --roxo1:#6f2cff;
  --roxo2:#9b5cff;
  --bg:#f3f3f6;
  --card:#ffffff;
  --texto:#1f1f27;
  --muted:#6b6b75;
  --borda:#e7e7ef;
  --campo:#f7f7fb;
  --sombra: 0 14px 30px rgba(0,0,0,0.07);
  --sombra2: 0 10px 24px rgba(0,0,0,0.06);
}
*{ margin:0; padding:0; box-sizing:border-box; font-family:Arial, sans-serif; }
body{ background:var(--bg); color:var(--texto); }
.container-principal{ display:flex; height:100vh; }

.logo{
  width: 100%;
  height: 78px;
  display: flex;
  justify-content: center;
  align-items: center;
  margin-bottom: 10px;
  overflow: visible;
}

.logo-sidebar{
  width: 170px;
  height: auto;
  object-fit: contain;
  display: block;
  transform: scale(1.55);
  transform-origin: center;
}

/* Menu */
.menu-novo {
  display: flex;
  flex-direction: column;
  gap: 8px;
  margin-top: 20px;
}

.item-menu {
  text-decoration: none;
  color: #222;
  padding: 12px 14px;
  border-radius: 12px;
  font-size: 14px;
  background: #f4f4f8;
  transition: all 0.2s ease;
}

.item-menu:hover {
  background: linear-gradient(90deg, #6f2cff, #9b5cff);
  color: white;
  transform: translateX(4px);
}

.item-menu.ativo {
  background: linear-gradient(90deg, #6f2cff, #9b5cff);
  color: white;
  font-weight: bold;
}

.item-menu.sair {
  margin-top: 12px;
  background: #111;
  color: white;
}

.item-menu.sair:hover {
  background: #000;
}


/* CONTEÚDO */
.conteudo{ flex:1; padding:32px; overflow-y:auto; }
.topo{
  display:flex; align-items:center;
  margin-bottom:18px;
  background:var(--card);
  border:1px solid var(--borda);
  border-radius:18px;
  padding:18px 20px;
  box-shadow:var(--sombra2);
}
.topo .lado-esq{ display:flex; align-items:center; gap:14px; }
.topo h1{ font-size:20px; }

/* ABAS */
.abas{ display:flex; gap:12px; margin:18px 0; }
.aba{
  padding:12px 18px;
  border-radius:14px;
  border:1px solid var(--borda);
  background:var(--card);
  cursor:pointer;
  font-weight:600;
  transition:all 0.25s;
  box-shadow:0 8px 18px rgba(0,0,0,0.04);
}
.aba:hover{ transform:translateY(-1px); border-color:rgba(111,44,255,0.25); }
.aba.ativa{
  background:linear-gradient(90deg,var(--roxo1),var(--roxo2));
  color:white;
  box-shadow:0 12px 22px rgba(111,44,255,0.25);
}

/* CARD */
.card{
  background:var(--card);
  border-radius:22px;
  border:1px solid var(--borda);
  padding:26px;
  box-shadow:var(--sombra);
  margin-bottom:22px;
  position:relative;
  overflow:hidden;
}
.card::before{
  content:"";
  position:absolute;
  inset:0;
  height:4px;
  background:linear-gradient(90deg,var(--roxo1),var(--roxo2));
  opacity:0.65;
}
.oculto{ display:none; }

/* FORM */
.form{
  display:grid;
  grid-template-columns:repeat(3,1fr);
  gap:18px;
  margin-top:6px;
}
.form input,
.form select,
.form textarea{
  width:100%;
  margin-top:6px;
  padding:14px;
  border-radius:16px;
  border:1px solid var(--borda);
  background:var(--campo);
  font-size:14px;
  transition:all 0.2s;
}
.form input:focus,
.form select:focus,
.form textarea:focus{
  outline:none;
  border-color:rgba(111,44,255,0.55);
  box-shadow:0 0 0 3px rgba(111,44,255,0.14);
  background:#fff;
}
.form textarea{
  grid-column:span 3;
  height:120px;
  resize:none;
}

/* CHECKBOX "JÁ PAGO" */
.check-ja-pago{
  display:flex;
  align-items:center;
  gap:10px;
  padding:14px;
  border-radius:16px;
  border:1px solid var(--borda);
  background:var(--campo);
  margin-top:6px;
  font-size:14px;
  cursor:pointer;
  user-select:none;
  transition:0.2s;
}
.check-ja-pago:hover{ border-color:rgba(111,44,255,0.25); transform:translateY(-1px); }
.check-ja-pago input{ width:18px; height:18px; margin:0; accent-color:var(--roxo1); }

/* UPLOAD */
.upload-wrap{ grid-column:span 3; display:flex; flex-direction:column; }
.upload-titulo{
  font-size:14px;
  font-weight:700;
  color:#374151;
  margin:6px 0 10px;
}
.upload-box{
  border:2px dashed #cfcfe6;
  border-radius:16px;
  padding:16px;
  text-align:center;
  background:#faf9ff;
  cursor:pointer;
  transition:0.2s;
}
.upload-box:hover{
  border-color:rgba(111,44,255,0.40);
  background:#f5f1ff;
  transform:translateY(-1px);
}
.upload-box input{ display:none; }
.upload-box span{ font-size:14px; color:#6b7280; }
.upload-box img{
  max-width:100%;
  margin-top:12px;
  border-radius:10px;
  display:none;
}

/* BOTÕES */
.acoes{ display:flex; justify-content:flex-end; gap:12px; margin-top:22px; }
.btn{
  padding:12px 18px;
  border-radius:14px;
  border:none;
  cursor:pointer;
  font-weight:700;
  transition:all 0.25s;
}
.btn.cancelar{ background:#ececf2; color:#2a2a35; }
.btn.cancelar:hover{ background:#dcdbea; transform:translateY(-1px); }
.btn.roxo{
  background:linear-gradient(90deg,var(--roxo1),var(--roxo2));
  color:white;
  box-shadow:0 12px 22px rgba(111,44,255,0.22);
}
.btn.roxo:hover{ opacity:0.92; transform:translateY(-1px); }

/* HISTÓRICO */
.card-interno{
  background:var(--card);
  border-radius:22px;
  border:1px solid var(--borda);
  padding:18px;
  box-shadow:var(--sombra);
  position:relative;
  overflow:hidden;
}
.card-interno::before{
  content:"";
  position:absolute;
  inset:0;
  height:4px;
  background:linear-gradient(90deg,var(--roxo1),var(--roxo2));
  opacity:0.65;
}
.filtros{
  display:flex; gap:10px; flex-wrap:wrap; align-items:center;
  margin:6px 0 16px;
}
.filtros select, .filtros input[type="date"]{
  padding:10px 12px;
  border-radius:14px;
  border:1px solid var(--borda);
  font-size:14px;
  background:var(--campo);
  cursor:pointer;
}
.filtros button{
  background:linear-gradient(90deg,var(--roxo1),var(--roxo2));
  color:white;
  border:none;
  border-radius:14px;
  padding:10px 16px;
  cursor:pointer;
  font-weight:800;
  transition:0.25s;
}
.filtros button:hover{ opacity:0.92; transform:translateY(-1px); }
.btn-limpar{
  background:#ececf2 !important;
  color:#2a2a35 !important;
}

/* REGISTRO */
.registro{
  border:1px solid var(--borda);
  border-radius:18px;
  padding:16px;
  margin-bottom:14px;
  background:var(--campo);
  display:flex;
  flex-direction:column;
  gap:12px;
}
.registro-grid{
  display:flex;
  flex-wrap:wrap;
  gap:12px;
  align-items:flex-start;
}
.registro-grid > div{ flex:1 1 180px; font-size:14px; min-width:180px; }
.registro strong{ color:#2a2a35; }

.registro input[readonly]{
  background:transparent; border:none; padding:0; width:100%;
}

.registro .acoes-registro{
  display:flex;
  gap:10px;
  justify-content:flex-end;
  flex-wrap:wrap;
}

.btn-peq{
  padding:10px 14px;
  border-radius:12px;
  border:none;
  cursor:pointer;
  font-weight:800;
  transition:0.2s;
}
.btn-editar{
  background:#e9e5ff;
  color:#2a2a35;
}
.btn-editar:hover{ transform:translateY(-1px); }
.btn-excluir{
  background:#111;
  color:#fff;
}
.btn-excluir:hover{ background:#000; transform:translateY(-1px); }

.btn-salvar{
  background:linear-gradient(90deg,var(--roxo1),var(--roxo2));
  color:white;
}
.btn-salvar:hover{ opacity:0.92; transform:translateY(-1px); }

.btn-cancelar-edicao{
  background:#ececf2;
  color:#2a2a35;
}
.btn-cancelar-edicao:hover{ background:#dcdbea; transform:translateY(-1px); }

.comprovante-area{
  display:flex;
  flex-direction:column;
  gap:8px;
}
.comprovante-area .titulo{
  font-size:13px;
  font-weight:800;
  color:#374151;
}
.comprovante-img{
  width:100%;
  max-width:520px;
  height:180px;
  object-fit:cover;
  border-radius:12px;
  border:1px solid rgba(0,0,0,0.08);
  background:#fff;
  cursor:pointer;
}

/* ✅ inputs quando em edição */
.registro input.editavel{
  background:#fff;
  border:1px solid rgba(111,44,255,0.25);
  padding:8px 10px;
  border-radius:10px;
}

/* ✅ selects quando em edição */
.registro select.editavel{
  width:100%;
  margin-top:6px;
  padding:10px 12px;
  border-radius:12px;
  border:1px solid rgba(111,44,255,0.25);
  background:#fff;
  font-size:14px;
}

/* ========= MODAL ========= */
.modal-comprovante{
  position:fixed;
  inset:0;
  background:rgba(0,0,0,0.65);
  display:none;
  align-items:center;
  justify-content:center;
  padding:22px;
  z-index:9999;
}
.modal-comprovante.ativo{ display:flex; }

.modal-caixa{
  width:min(1100px, 96vw);
  height:min(760px, 92vh);
  background:#0b0b0f;
  border-radius:18px;
  border:1px solid rgba(255,255,255,0.12);
  overflow:hidden;
  box-shadow:0 30px 80px rgba(0,0,0,0.45);
  display:flex;
  flex-direction:column;
}
.modal-topo{
  display:flex;
  align-items:center;
  justify-content:space-between;
  padding:12px 14px;
  background:rgba(255,255,255,0.06);
  border-bottom:1px solid rgba(255,255,255,0.12);
}
.modal-topo .titulo{
  color:#fff;
  font-weight:800;
  font-size:14px;
  opacity:0.92;
}
.modal-topo .botoes{
  display:flex;
  gap:8px;
  align-items:center;
}
.modal-btn{
  border:none;
  cursor:pointer;
  padding:10px 12px;
  border-radius:12px;
  font-weight:900;
  background:rgba(255,255,255,0.10);
  color:#fff;
  transition:0.2s;
}
.modal-btn:hover{ background:rgba(255,255,255,0.16); transform:translateY(-1px); }
.modal-btn.fechar{ background:rgba(255,255,255,0.14); }

.modal-view{
  flex:1;
  position:relative;
  overflow:hidden;
  background:#000;
  user-select:none;
  cursor:grab;
}
.modal-view.arrastando{ cursor:grabbing; }

.modal-img{
  position:absolute;
  top:50%;
  left:50%;
  transform:translate(-50%,-50%) scale(1);
  transform-origin:center;
  max-width:none;
  max-height:none;
  width:auto;
  height:auto;
  will-change:transform;
}

/* RESPONSIVO */
@media (max-width: 980px){
  .form{ grid-template-columns:repeat(2,1fr); }
  .form textarea{ grid-column:span 2; }
  .upload-wrap{ grid-column:span 2; }
}
@media (max-width: 640px){
  .barra-lateral{ display:none; }
  .conteudo{ padding:18px; }
  .form{ grid-template-columns:1fr; }
  .form textarea{ grid-column:span 1; }
  .upload-wrap{ grid-column:span 1; }
  .topo{ flex-direction:column; align-items:flex-start; gap:10px; }
  .registro-grid > div{ min-width:140px; }
  .comprovante-img{ max-width:100%; height:160px; }
}
</style>
</head>

<body>

<!-- ✅ APENAS 1 container-principal (FLEX correto) -->
<div class="container-principal">
 <aside class="barra-lateral">
  <div class="logo">
  <img class="logo-sidebar"
       src="{{ url_for('static', filename='img/logoinfoway.png') }}"
       alt="Infoway Unny Telecom">
</div>
    <nav class="menu-novo">
      <a href="{{ url_for('dashboard') }}" class="item-menu">Executivo</a>

      
      <a href="{{ url_for('geral_informacao') }}" class="item-menu ">Registros</a>

      <a href="{{ url_for('abastecimento') }}" class="item-menu ativo">Registrar abastecimento</a>
      <a href="{{ url_for('cadastro') }}" class="item-menu">Cadastrar</a>
      <a href="{{ url_for('ajuda') }}" class="item-menu">Ajuda</a>
      <a href="{{ url_for('logout') }}" class="item-menu sair">Sair</a>
    </nav>
  </aside>

  <main class="conteudo">
    <header class="topo">
      <div class="lado-esq">
        <h1>Registro de Abastecimento e Manutenção</h1>
      </div>
    </header>

    <div class="abas">
      <button class="aba ativa" onclick="trocarAba('abastecimento', this)">Abastecimento</button>
      <button class="aba" onclick="trocarAba('manutencao', this)">Manutenção</button>
      <button class="aba" onclick="trocarAba('historico', this)">Histórico</button>
    </div>

    <!-- ABA ABASTECIMENTO -->
    <section id="abastecimento" class="card">
      <div class="form">
        <input type="date" id="data" />
        <input type="time" id="hora" />
        <select id="selectMotorista"></select>

        <select id="selectPosto"></select>
        <select id="selectVeiculo"></select>
        <select id="selectCombustivel">
          <option value="" disabled selected>Selecione o combustível</option>
        </select>

        <input placeholder="Odômetro" id="odometro" />

        <label class="check-ja-pago" for="pagoAbastecimento">
          <input type="checkbox" id="pagoAbastecimento" />
          Já pago
        </label>

        <input placeholder="Litros" id="inputLitros" type="number" step="0.01" />
        <input placeholder="Preço automático" readonly id="inputPreco" />

        <div class="upload-wrap">
          <div class="upload-titulo">Comprovante do abastecimento</div>
          <label class="upload-box">
            <span>Clique para anexar o comprovante</span>
            <input type="file" id="comprovanteAbastecimento" accept="image/*">
            <img id="previewAbastecimento" alt="Prévia do comprovante">
          </label>
        </div>

        <textarea placeholder="Observações" id="obsAbastecimento"></textarea>
      </div>

      <div class="acoes">
        <button class="btn cancelar" onclick="resetForm()">Cancelar</button>
        <button class="btn roxo" onclick="registrarAbastecimento()">Registrar Abastecimento</button>
      </div>
    </section>

    <!-- ABA MANUTENÇÃO -->
    <section id="manutencao" class="card oculto">
      <div class="form">
        <input type="date" id="dataManut" />
        <input type="time" id="horaManut" />
        <select id="selectMotoristaManut"></select>

        <select id="selectVeiculoManut"></select>

        <label class="check-ja-pago" for="pagoManutencao">
          <input type="checkbox" id="pagoManutencao" />
          Já pago
        </label>

        <input placeholder="Valor" type="number" step="0.01" id="inputValorManut" />
        <input placeholder="Prestador de serviço" id="inputPrestadorManut" />

        <div class="upload-wrap">
          <div class="upload-titulo">Comprovante da manutenção</div>
          <label class="upload-box">
            <span>Clique para anexar o comprovante</span>
            <input type="file" id="comprovanteManutencao" accept="image/*">
            <img id="previewManutencao" alt="Prévia do comprovante">
          </label>
        </div>

        <textarea placeholder="Observações" id="obsManutencao"></textarea>
      </div>

      <div class="acoes">
        <button class="btn roxo" onclick="registrarManutencao()">Registrar Manutenção</button>
      </div>
    </section>

    <!-- ABA HISTÓRICO -->
    <section id="historico" class="oculto">
      <div class="card-interno">
        <div class="filtros">
          <input type="date" id="filtroData" />
          <select id="filtroMotorista"></select>
          <select id="filtroVeiculo"></select>
          <select id="filtroPostoPrestador"></select>

          <select id="filtroTipo">
            <option value="">Todos</option>
            <option value="abastecimento">Abastecimento</option>
            <option value="manutencao">Manutenção</option>
            <option value="abastecimento_nao_pago">Abastecimento não pago</option>
            <option value="manutencao_nao_pago">Manutenção não paga</option>
          </select>

          <label class="check-ja-pago" for="filtroPago" style="padding:10px 12px;">
            <input type="checkbox" id="filtroPago" />
            Já pago
          </label>

          <button onclick="filtrarHistorico()">Filtrar</button>
          <button class="btn-limpar" onclick="limparFiltros()">Limpar</button>
        </div>

        <div id="listaHistorico"></div>
      </div>
    </section>
  </main>

</div>
<!-- ✅ FECHA o container-principal ANTES do modal -->


<!-- ✅ MODAL -->
<div id="modalComprovante" class="modal-comprovante" onclick="fecharModalSeFundo(event)">
  <div class="modal-caixa" role="dialog" aria-modal="true">
    <div class="modal-topo">
      <div class="titulo">Visualizar comprovante</div>
      <div class="botoes">
        <button class="modal-btn" onclick="zoomOut()">−</button>
        <button class="modal-btn" onclick="zoomIn()">+</button>
        <button class="modal-btn" onclick="resetZoom()">Reset</button>
        <button class="modal-btn fechar" onclick="fecharModal()">✕</button>
      </div>
    </div>
    <div id="modalView" class="modal-view">
      <img id="modalImg" class="modal-img" alt="Comprovante em zoom">
    </div>
  </div>
</div>

<script>
/* ===== ABAS ===== */
function trocarAba(id, botao){
  document.querySelectorAll(".aba").forEach(b=>b.classList.remove("ativa"));
  botao.classList.add("ativa");
  ["abastecimento","manutencao","historico"].forEach(sec=>document.getElementById(sec).classList.add("oculto"));
  document.getElementById(id).classList.remove("oculto");
}

/* ===== DADOS ===== */
let registros = [];
let motoristas = [];
let veiculos = [];
let postos = [];

/* =========================================================
   ✅ ODOMETRO: "0" inicial + normalização por veículo
   ========================================================= */
const KEY_ODO_DIGITS = "odometro_digits_por_veiculo";

function getOdoDigitsMap(){
  try { return JSON.parse(localStorage.getItem(KEY_ODO_DIGITS)) || {}; }
  catch { return {}; }
}
function setOdoDigitsMap(map){
  localStorage.setItem(KEY_ODO_DIGITS, JSON.stringify(map));
}
function onlyDigits(s){ return String(s ?? "").replace(/[^\d]/g, ""); }

function getDigitsForVehicle(veiculoId){
  const map = getOdoDigitsMap();
  const cur = Number(map[String(veiculoId)] || 0);
  return Math.max(cur || 0, 6);
}

function updateDigitsForVehicle(veiculoId, digits){
  const map = getOdoDigitsMap();
  const cur = Number(map[String(veiculoId)] || 0);
  if(digits > cur){
    map[String(veiculoId)] = digits;
    setOdoDigitsMap(map);
  }
}

function normalizarOdometroStr(odometroDigitado, veiculoId){
  const dig = onlyDigits(odometroDigitado);
  if(!dig) return "";
  const pad = Math.max(getDigitsForVehicle(veiculoId), dig.length);
  updateDigitsForVehicle(veiculoId, pad);
  return dig.padStart(pad, "0");
}

(function setupOdometerInput(){
  const input = document.getElementById("odometro");
  const selVeiculo = document.getElementById("selectVeiculo");
  if(!input || !selVeiculo) return;

  input.addEventListener("focus", () => {
    if(input.value.trim() === ""){
      input.value = "0";
      requestAnimationFrame(()=> input.setSelectionRange(input.value.length, input.value.length));
    }
  });

  input.addEventListener("input", () => {
    input.value = onlyDigits(input.value);
  });

  input.addEventListener("blur", () => {
    const veiculoId = parseInt(selVeiculo.value);
    if(!veiculoId) return;
    const norm = normalizarOdometroStr(input.value, veiculoId);
    input.value = norm;
  });
})();

/* ===== ORDENAR POR DATA/HORA ===== */
function ordenarMaisRecentePrimeiro(lista){
  return [...lista].sort((a,b)=>{
    const ta = new Date(`${a.data}T${a.hora || "00:00"}`).getTime();
    const tb = new Date(`${b.data}T${b.hora || "00:00"}`).getTime();
    return tb - ta;
  });
}

/* ===== POPULAR SELECTS ===== */
function popular(id,array,placeholder,tipo){
  const sel = document.getElementById(id);
  if(!sel) return;

  sel.innerHTML = "";
  const opt = document.createElement("option");
  opt.value = "";
  opt.textContent = placeholder;
  opt.disabled = true;
  opt.selected = true;
  sel.appendChild(opt);

  array.forEach(item=>{
    const o = document.createElement("option");
    if(tipo==="motorista"){ o.value = item.id; o.textContent = item.nome; }
    else if(tipo==="veiculo"){ o.value = item.id; o.textContent = `${item.placa} - ${item.modelo}`; }
    else if(tipo==="posto"){ o.value = item.id; o.textContent = item.nome; }
    sel.appendChild(o);
  });
}

function popularTudo(){
  ["selectMotorista","selectMotoristaManut","filtroMotorista"].forEach(id=>popular(id,motoristas,"Selecione o motorista","motorista"));
  ["selectVeiculo","selectVeiculoManut","filtroVeiculo"].forEach(id=>popular(id,veiculos,"Selecione o veículo","veiculo"));
  ["selectPosto"].forEach(id=>popular(id,postos,"Posto/Prestador","posto"));
}

/* ===== COMBUSTÍVEL DEPENDENTE DO POSTO ===== */
function montarCombustiveisDoPosto(){
  const selectPosto = document.getElementById("selectPosto");
  const selComb = document.getElementById("selectCombustivel");
  if(!selectPosto || !selComb) return;

  selectPosto.addEventListener("change", ()=> {

    if(posto){

document.getElementById("inputLitros").addEventListener("input", atualizarPreco);

function atualizarPreco(){
  const litros = parseFloat(document.getElementById("inputLitros").value);
  const postoId = parseInt(document.getElementById("selectPosto").value);
  const combustivel = document.getElementById("selectCombustivel").value;
  const inputPreco = document.getElementById("inputPreco");

  if(!postoId || !combustivel || isNaN(litros)){
    inputPreco.value = "";
    return;
  }

  const posto = postos.find(p => p.id === postoId);
  const precoUnitario = posto?.combustiveis?.find(c => c.tipo === combustivel)?.preco || 0;
  inputPreco.value = (litros * precoUnitario).toFixed(2);
}

function calcularPrecoUnitarioAtual(postoId, combustivel){
  const posto = postos.find(p => p.id === postoId);
  const unit = posto?.combustiveis?.find(c => c.tipo === combustivel)?.preco || 0;
  return Number(unit || 0);
}

/* ===== UPLOAD -> BASE64 ===== */
let comprovanteAbastecimentoBase64 = "";
let comprovanteManutencaoBase64 = "";

function lerImagemParaBase64(input, previewId, callback){
  const preview = document.getElementById(previewId);
  if(!input || !preview) return;

  input.addEventListener("change", () => {
    const file = input.files && input.files[0];
    if(!file){
      preview.style.display = "none";
      preview.removeAttribute("src");
      callback("");
      return;
    }
    const reader = new FileReader();
    reader.onload = (e) => {
      preview.src = e.target.result;
      preview.style.display = "block";
      callback(e.target.result);
    };
    reader.readAsDataURL(file);
  });
}

lerImagemParaBase64(
  document.getElementById("comprovanteAbastecimento"),
  "previewAbastecimento",
  (b64)=>comprovanteAbastecimentoBase64=b64
);

lerImagemParaBase64(
  document.getElementById("comprovanteManutencao"),
  "previewManutencao",

);

function resetForm(){
  const campos = document.querySelectorAll(
    "#abastecimento input, #abastecimento select, #abastecimento textarea, " +
    "#manutencao input, #manutencao select, #manutencao textarea"
  );

  campos.forEach(el=>{
    if(el.type === "checkbox"){ el.checked = false; return; }
    if(el.type === "file"){ el.value = ""; return; }
    if(el.tagName === "SELECT"){ el.selectedIndex = 0; }
    else{ el.value = ""; }
  });

  ["previewAbastecimento","previewManutencao"].forEach(id=>{
    const img = document.getElementById(id);
    if(img){
      img.style.display = "none";
      img.removeAttribute("src");
    }
  });

  comprovanteAbastecimentoBase64 = "";
  comprovanteManutencaoBase64 = "";

  const selComb = document.getElementById("selectCombustivel");
  if(selComb){
    selComb.innerHTML = '<option value="" disabled selected>Selecione o combustível</option>';
  }
  const inputPreco = document.getElementById("inputPreco");
  if(inputPreco) inputPreco.value = "";
}

/* ===== FILTROS ===== */
function atualizarFiltroPostoPrestador(){
  const sel = document.getElementById("filtroPostoPrestador");
  if(!sel) return;

  const valorAtual = sel.value;

  const prestadores = [...new Set(
    registros
      .filter(r=>r.tipo==="manutencao" && r.prestador)
      .map(r=>(r.prestador || "").trim())
  )].filter(Boolean).sort((a,b)=>a.localeCompare(b));

  sel.innerHTML = "";

  const opt0 = document.createElement("option");
  opt0.value = "";
  opt0.textContent = "Posto/Prestador";
  opt0.selected = true;
  sel.appendChild(opt0);

  postos.forEach(p=>{
    const o = document.createElement("option");
    o.value = `posto:${p.id}`;
    o.textContent = `Posto: ${p.nome}`;
    sel.appendChild(o);
  });

  prestadores.forEach(nome=>{
    const o = document.createElement("option");
    o.value = `prestador:${nome}`;
    o.textContent = `Prestador: ${nome}`;
    sel.appendChild(o);
  });

  if(valorAtual) sel.value = valorAtual;
}

function filtrarHistorico(){
  const data = document.getElementById("filtroData").value;
  const motoristaId = parseInt(document.getElementById("filtroMotorista").value);
  const veiculoId = parseInt(document.getElementById("filtroVeiculo").value);
  const postoPrestador = document.getElementById("filtroPostoPrestador").value;
  const tipo = document.getElementById("filtroTipo").value;
  const somentePago = document.getElementById("filtroPago").checked;

  let filtrados = [...registros];

  if(data) filtrados = filtrados.filter(r => r.data === data);
  if(!isNaN(motoristaId)) filtrados = filtrados.filter(r => r.motoristaId === motoristaId);
  if(!isNaN(veiculoId)) filtrados = filtrados.filter(r => r.veiculoId === veiculoId);

  if(tipo === "abastecimento"){
    filtrados = filtrados.filter(r => r.tipo === "abastecimento");
  } else if(tipo === "manutencao"){
    filtrados = filtrados.filter(r => r.tipo === "manutencao");
  } else if(tipo === "abastecimento_nao_pago"){
    filtrados = filtrados.filter(r => r.tipo === "abastecimento" && r.pago === false);
  } else if(tipo === "manutencao_nao_pago"){
    filtrados = filtrados.filter(r => r.tipo === "manutencao" && r.pago === false);
  }

  if(postoPrestador){
    const [kind, val] = postoPrestador.split(":");
    if(kind === "posto"){
      const pid = parseInt(val);
      filtrados = filtrados.filter(r => r.tipo === "abastecimento" && r.postoId === pid);
    } else if(kind === "prestador"){
      filtrados = filtrados.filter(r => r.tipo === "manutencao" && (r.prestador || "").trim() === val);
    }
  }

  if(somentePago){
    filtrados = filtrados.filter(r => r.pago === true);
  }

  filtrados = ordenarMaisRecentePrimeiro(filtrados);

  const lista = document.getElementById("listaHistorico");
  lista.innerHTML = "";
  filtrados.forEach((r)=>lista.appendChild(criarDivRegistro(r)));
}

function limparFiltros(){
  document.getElementById("filtroData").value = "";
  document.getElementById("filtroTipo").value = "";
  document.getElementById("filtroPago").checked = false;

  const s1 = document.getElementById("filtroMotorista"); if(s1) s1.selectedIndex = 0;
  const s2 = document.getElementById("filtroVeiculo"); if(s2) s2.selectedIndex = 0;
  const s3 = document.getElementById("filtroPostoPrestador"); if(s3) s3.selectedIndex = 0;

  carregarHistorico();
}

function optionsCombustivel(postoId, selected){
  const posto = postos.find(p => Number(p.id) === Number(postoId));
  const lista = (posto?.combustiveis || []);
  const base = `<option value="" disabled ${selected ? "" : "selected"}>Selecione o combustível</option>`;
  const opts = lista.map(c => {
    const tipo = String(c.tipo);
    const label = `${tipo} - R$ ${Number(c.preco || 0).toFixed(2)}`;
    return `<option value="${tipo}" ${tipo===selected?"selected":""}>${label}</option>`;
  }).join("");

          <input data-view value="${veiculoNome}" readonly>
          <select data-edit data-e="veiculo" class="editavel" style="display:none;">
            ${optionsVeiculos(r.veiculoId)}
          </select>
        </div>

        <div>
          <strong>Valor:</strong>
          <input data-view type="number" value="${Number(r.valor || 0).toFixed(2)}" readonly>
          <input data-edit data-e="valor" class="editavel" type="number" step="0.01" value="${Number(r.valor || 0).toFixed(2)}" style="display:none;">
        </div>

        <div>
          <strong>Prestador:</strong>
          <input data-view value="${r.prestador || ''}" readonly>
          <input data-edit data-e="prestador" class="editavel" value="${r.prestador || ''}" style="display:none;">
        </div>

        <div>
          <strong>Status:</strong>
          <div data-view>${montarCheckboxPago(r.pago)}</div>
          <label data-edit class="check-ja-pago" style="padding:10px 12px; margin-top:0; display:none;">
            <input type="checkbox" data-e="pago" ${r.pago ? "checked":""} />
            Já pago
          </label>
        </div>

        <div style="flex:1 1 360px; min-width:240px;">
          <strong>Obs:</strong>
          <input data-view value="${(r.obs || "")}" readonly>
          <input data-edit data-e="obs" class="editavel" value="${(r.obs || "")}" style="display:none;">
        </div>
      </div>

      <div class="comprovante-area">
        <div class="titulo">Comprovante (clique para ampliar)</div>
        ${comprovanteHTML}
      </div>

      <div class="acoes-registro">
        <button class="btn-peq btn-editar">Editar</button>
        <button class="btn-peq btn-excluir">Excluir</button>
        <button class="btn-peq btn-salvar" style="display:none;">Salvar</button>
        <button class="btn-peq btn-cancelar-edicao" style="display:none;">Cancelar</button>
      </div>
    `;
  }

  // binds botões
  const btnEditar = div.querySelector(".btn-editar");
  const btnExcluir = div.querySelector(".btn-excluir");
  const btnSalvar = div.querySelector(".btn-salvar");
  const btnCancel = div.querySelector(".btn-cancelar-edicao");

  btnEditar.addEventListener("click", ()=>{
    setEditMode(div, true);
  });

  btnCancel.addEventListener("click", ()=>{
    const novo = criarDivRegistro(r);
    div.replaceWith(novo);
  });

  btnSalvar.addEventListener("click", async ()=>{
    await salvarEdicaoNoBanco(div, r);
  });

  btnExcluir.addEventListener("click", async ()=>{
    await excluirRegistroNoBanco(r);
  });

  return div;
}

/* =========================================================
   ✅ MODAL / ZOOM / ARRASTAR
   ========================================================= */
let zoomLevel = 1;
let posX = 0;
let posY = 0;
let startX = 0;
let startY = 0;
let dragging = false;

function aplicarTransform(){
  const img = document.getElementById("modalImg");
  img.style.transform = `translate(calc(-50% + ${posX}px), calc(-50% + ${posY}px)) scale(${zoomLevel})`;
}

function abrirModal(src){
  const modal = document.getElementById("modalComprovante");
  const img = document.getElementById("modalImg");
  img.src = src;

  zoomLevel = 1;
  posX = 0;
  posY = 0;
  aplicarTransform();

  modal.classList.add("ativo");
}

function fecharModal(){
  document.getElementById("modalComprovante").classList.remove("ativo");
}

function fecharModalSeFundo(e){
  if(e.target && e.target.id === "modalComprovante"){
    fecharModal();
  }
}

function zoomIn(){
  zoomLevel = Math.min(zoomLevel + 0.2, 6);
  aplicarTransform();
}
function zoomOut(){
  zoomLevel = Math.max(zoomLevel - 0.2, 0.6);
  aplicarTransform();
}
function resetZoom(){
  zoomLevel = 1;
  posX = 0;
  posY = 0;
  aplicarTransform();
}

document.addEventListener("keydown", (e)=>{
  if(e.key === "Escape"){
    const modal = document.getElementById("modalComprovante");
    if(modal.classList.contains("ativo")) fecharModal();
  }
});

const modalView = document.getElementById("modalView");
modalView.addEventListener("mousedown", (e)=>{
  dragging = true;
  startX = e.clientX - posX;
  startY = e.clientY - posY;
  modalView.classList.add("arrastando");
});
window.addEventListener("mousemove", (e)=>{
  if(!dragging) return;
  posX = e.clientX - startX;
  posY = e.clientY - startY;
  aplicarTransform();
});
window.addEventListener("mouseup", ()=>{
  dragging = false;
  modalView.classList.remove("arrastando");
});

modalView.addEventListener("wheel", (e)=>{
  e.preventDefault();
  const delta = Math.sign(e.deltaY);
  if(delta > 0) zoomOut();
  else zoomIn();
}, { passive:false });

}

init();
