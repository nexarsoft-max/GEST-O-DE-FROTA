<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<title>Cadastrar Veículo</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<link rel="stylesheet" href="{{ url_for('static', filename='css/cadastrarveiculo.css') }}">
</head>
<body>

<div class="card">
  <div class="card-header">
    <button class="back-btn" type="button" onclick="location.assign('/cadastro')">←</button>

    <strong>Cadastrar Veículo</strong>
  </div>

  <div class="card-body">
    <div class="form-grid">
      <div class="form-group">
        <label>Modelo *</label>
        <input id="modelo" placeholder="Modelo do veículo" required>
      </div>

      <div class="form-group">
        <label>Placa *</label>
        <input id="placa" placeholder="ABC-1234" required>
      </div>

      <div class="form-group">
        <label>Renavam</label>
        <input id="renavam" placeholder="Opcional">
      </div>

      <div class="form-group full">
        <label>Cidade *</label>
        <input id="cidade" placeholder="Cidade de atuação" required>
      </div>
    </div>

    <div class="actions">
      <button type="button" onclick="cadastrarVeiculo()">Cadastrar Veículo</button>
    </div>
  </div>
</div>
<script src="{{ url_for('static', filename='js/cadastrarveiculo.js') }}"></script>
</body>
</html>
