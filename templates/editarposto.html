<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<title>Editar Posto</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<link rel="stylesheet" href="{{ url_for('static', filename='css/editarposto.css') }}">
</head>

<body data-posto-id="{{ posto_id }}">

<div class="card">
  <div class="card-header">
    <button class="back-btn" type="button" onclick="location.assign('/dentroposto')">←</button>
    <strong>Editar Posto</strong>
  </div>

  <div class="card-body">
    <div class="form-grid">
      <div class="full">
        <label>Nome do Posto</label>
        <input id="nome" placeholder="Nome">
      </div>

      <div class="full">
        <label>Endereço</label>
        <input id="endereco" placeholder="Endereço">
      </div>

      <div class="full">
        <label>Valores de Combustível</label>
        <div class="mini-grid">
          <input id="gasolina" placeholder="Gasolina (R$)">
          <input id="etanol" placeholder="Etanol (R$)">
          <input id="diesel" placeholder="Diesel (R$)">
        </div>
      </div>
    </div>

    <div class="actions">
      <button class="btn-save" type="button" onclick="salvar()">Salvar Alterações</button>
      <button class="btn-save btn-delete" type="button" onclick="abrirModal()">Excluir</button>
    </div>

    <div class="msg" id="msg"></div>
  </div>
</div>

<div class="modal" id="modal" onclick="fecharModal(event)">
  <div class="modal-box">
    <p><strong>Confirmar exclusão?</strong><br>Essa ação não pode ser desfeita.</p>
    <div class="modal-actions">
      <button class="cancel" type="button" onclick="fecharModal()">Cancelar</button>
      <button class="confirm" type="button" onclick="excluir()">Excluir</button>
    </div>
  </div>
</div>

<script src="{{ url_for('static', filename='js/editarposto.js') }}"></script>
</body>
</html>
