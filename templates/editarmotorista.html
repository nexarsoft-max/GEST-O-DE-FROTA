<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<title>Editar Motorista</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<link rel="stylesheet" href="{{ url_for('static', filename='css/editarmotorista.css') }}">
</head>

<body>

<div class="card">
  <div class="card-header">
    <button class="back-btn" onclick="window.location.href='dentromotorista.html'">←</button>
    <strong>Editar Motorista</strong>
  </div>

  <div class="card-body">
    <div class="form-grid">
      <div class="form-group">
        <label>Nome completo *</label>
        <input id="nome">
      </div>

      <div class="form-group">
        <label>CPF *</label>
        <input id="cpf">
      </div>

      <div class="form-group">
        <label>Data de nascimento</label>
        <input id="nascimento" type="date">
      </div>

      <div class="form-group full">
        <label>Endereço *</label>
        <input id="endereco">
      </div>

      <!-- CNH Frente -->
      <div class="form-group full">
        <label>CNH - Frente</label>
        <label class="upload-box">
          <span>Clique para anexar a CNH (frente)</span>
          <input type="file" accept="image/*" id="cnhFrente">
          <img id="previewFrente">
        </label>
      </div>

      <!-- CNH Verso -->
      <div class="form-group full">
        <label>CNH - Verso</label>
        <label class="upload-box">
          <span>Clique para anexar a CNH (verso)</span>
          <input type="file" accept="image/*" id="cnhVerso">
          <img id="previewVerso">
        </label>
      </div>
    </div>

    <div class="actions">
      <button class="btn salvar" onclick="salvar()">Salvar</button>
      <button class="btn excluir" onclick="excluir()">Excluir</button>
    </div>
  </div>
</div>

<script src="{{ url_for('static', filename='js/editarmotorista.js') }}"></script>


</body>
</html>
