<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<title>Veículos</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<style>
*{box-sizing:border-box;font-family:Arial}
body{background:#f3f4f6;margin:0}
.header{height:70px;background:linear-gradient(90deg,#6f2cff,#9b5cff);display:flex;align-items:center;padding:0 24px;color:#fff}
.back{width:40px;height:40px;border-radius:12px;background:rgba(255,255,255,.15);border:none;color:#fff;font-size:22px;cursor:pointer}
.container{padding:40px;display:grid;grid-template-columns:repeat(auto-fill,minmax(280px,1fr));gap:24px}
.card{background:#fff;border-radius:18px;padding:24px;box-shadow:0 12px 28px rgba(0,0,0,.08)}
.vazio{text-align:center;color:#666;grid-column:1/-1}
</style>
</head>
<body>

<header class="header">
  <button class="back" type="button" onclick="location.assign('/geralinformacao')">←</button>
  <h1 style="margin-left:16px">Veículos</h1>
</header>

<main class="container" id="lista"></main>

<script>
async function carregar(){
  const container = document.getElementById("lista");
  container.innerHTML = "";

  try{
    const resp = await fetch("/api/veiculos", { headers: { "Accept":"application/json" } });
    const data = await resp.json().catch(()=> ([]));

    if(resp.status === 401){
      alert("Sua sessão expirou. Faça login novamente.");
      location.assign("/");
      return;
    }

    if(!resp.ok){
      container.innerHTML = `<div class="vazio">Erro ao carregar veículos</div>`;
      return;
    }

    if(!Array.isArray(data) || data.length === 0){
      container.innerHTML = `<div class="vazio">Nenhum veículo cadastrado</div>`;
      return;
    }

    data.forEach(v=>{
      const div = document.createElement("div");
      div.className = "card";
      div.innerHTML = `
        <h3>${v.modelo}</h3>
        <p>Placa: ${v.placa}</p>
        <p>Cidade: ${v.cidade}</p>
        <div style="margin-top:14px; display:flex; gap:10px;">
          <button style="flex:1;height:42px;border-radius:12px;border:none;cursor:pointer;background:#8b1cf6;color:#fff"
            onclick="location.assign('/editarveiculo/${v.id}')">Editar</button>
        </div>
      `;
      container.appendChild(div);
    });

  }catch(e){
    container.innerHTML = `<div class="vazio">Erro ao carregar veículos</div>`;
    console.error(e);
  }
}
carregar();
</script>

</body>
</html>
