<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Registro de Abastecimento e Manutenção</title>

<!-- ✅ CSS AGORA EXTERNO (por causa da separação) -->
<link rel="stylesheet" href="{{ url_for('static', filename='css/abastecimento.css') }}">

</head>

<body>

<!-- ✅ APENAS 1 container-principal (FLEX correto) -->
<div class="container-principal">

  <aside class="barra-lateral">
    <img src="{{ url_for('static', filename='img/logo.png') }}" alt="Logo">
    

    <nav class="menu-novo">
      <a href="{{ url_for('dashboard') }}" class="item-menu">Executivo</a>

      <!-- ✅ AQUI ERA O ERRO -->
      <a href="{{ url_for('geral_informacao') }}" class="item-menu ">Registros</a>

      <a href="{{ url_for('abastecimento') }}" class="item-menu ativo">Registrar abastecimento</a>
      <a href="{{ url_for('cadastro') }}" class="item-menu">Cadastrar</a>
      <a href="{{ url_for('termos') }}" class="item-menu">Termos</a>
      <a href="{{ url_for('logout') }}" class="item-menu sair">Sair</a>
    </nav>
  </aside>

  <main class="conteudo">
    <header class="topo">
      <div class="lado-esq">
        <h1>Registro de Abastecimento e Manutenção</h1>
      </div>
    </header>

    <div class="abas">
      <button class="aba ativa" onclick="trocarAba('abastecimento', this)">Abastecimento</button>
      <button class="aba" onclick="trocarAba('manutencao', this)">Manutenção</button>
      <button class="aba" onclick="trocarAba('historico', this)">Histórico</button>
    </div>

    <!-- ABA ABASTECIMENTO -->
    <section id="abastecimento" class="card">
      <div class="form">
        <input type="date" id="data" />
        <input type="time" id="hora" />
        <select id="selectMotorista"></select>

        <select id="selectPosto"></select>
        <select id="selectVeiculo"></select>
        <select id="selectCombustivel">
          <option value="" disabled selected>Selecione o combustível</option>
        </select>

        <input placeholder="Odômetro" id="odometro" />

        <label class="check-ja-pago" for="pagoAbastecimento">
          <input type="checkbox" id="pagoAbastecimento" />
          Já pago
        </label>

        <input placeholder="Litros" id="inputLitros" type="number" step="0.01" />
        <input placeholder="Preço automático" readonly id="inputPreco" />

        <div class="upload-wrap">
          <div class="upload-titulo">Comprovante do abastecimento</div>
          <label class="upload-box">
            <span>Clique para anexar o comprovante</span>
            <input type="file" id="comprovanteAbastecimento" accept="image/*">
            <img id="previewAbastecimento" alt="Prévia do comprovante">
          </label>
        </div>

        <textarea placeholder="Observações" id="obsAbastecimento"></textarea>
      </div>

      <div class="acoes">
        <button class="btn cancelar" onclick="resetForm()">Cancelar</button>
        <button class="btn roxo" onclick="registrarAbastecimento()">Registrar Abastecimento</button>
      </div>
    </section>

    <!-- ABA MANUTENÇÃO -->
    <section id="manutencao" class="card oculto">
      <div class="form">
        <input type="date" id="dataManut" />
        <input type="time" id="horaManut" />
        <select id="selectMotoristaManut"></select>

        <select id="selectVeiculoManut"></select>

        <label class="check-ja-pago" for="pagoManutencao">
          <input type="checkbox" id="pagoManutencao" />
          Já pago
        </label>

        <input placeholder="Valor" type="number" step="0.01" id="inputValorManut" />
        <input placeholder="Prestador de serviço" id="inputPrestadorManut" />

        <div class="upload-wrap">
          <div class="upload-titulo">Comprovante da manutenção</div>
          <label class="upload-box">
            <span>Clique para anexar o comprovante</span>
            <input type="file" id="comprovanteManutencao" accept="image/*">
            <img id="previewManutencao" alt="Prévia do comprovante">
          </label>
        </div>

        <textarea placeholder="Observações" id="obsManutencao"></textarea>
      </div>

      <div class="acoes">
        <button class="btn roxo" onclick="registrarManutencao()">Registrar Manutenção</button>
      </div>
    </section>

    <!-- ABA HISTÓRICO -->
    <section id="historico" class="oculto">
      <div class="card-interno">
        <div class="filtros">
          <input type="date" id="filtroData" />
          <select id="filtroMotorista"></select>
          <select id="filtroVeiculo"></select>
          <select id="filtroPostoPrestador"></select>

          <select id="filtroTipo">
            <option value="">Todos</option>
            <option value="abastecimento">Abastecimento</option>
            <option value="manutencao">Manutenção</option>
            <option value="abastecimento_nao_pago">Abastecimento não pago</option>
            <option value="manutencao_nao_pago">Manutenção não paga</option>
          </select>

          <label class="check-ja-pago" for="filtroPago" style="padding:10px 12px;">
            <input type="checkbox" id="filtroPago" />
            Já pago
          </label>

          <button onclick="filtrarHistorico()">Filtrar</button>
          <button class="btn-limpar" onclick="limparFiltros()">Limpar</button>
        </div>

        <div id="listaHistorico"></div>
      </div>
    </section>
  </main>

</div>
<!-- ✅ FECHA o container-principal ANTES do modal -->

<!-- ✅ MODAL -->
<div id="modalComprovante" class="modal-comprovante" onclick="fecharModalSeFundo(event)">
  <div class="modal-caixa" role="dialog" aria-modal="true">
    <div class="modal-topo">
      <div class="titulo">Visualizar comprovante</div>
      <div class="botoes">
        <button class="modal-btn" onclick="zoomOut()">−</button>
        <button class="modal-btn" onclick="zoomIn()">+</button>
        <button class="modal-btn" onclick="resetZoom()">Reset</button>
        <button class="modal-btn fechar" onclick="fecharModal()">✕</button>
      </div>
    </div>
    <div id="modalView" class="modal-view">
      <img id="modalImg" class="modal-img" alt="Comprovante em zoom">
    </div>
  </div>
</div>

<!-- ✅ JS EXTERNO (no final do body) -->
<script src="{{ url_for('static', filename='js/abastecimento.js') }}"></script>

</body>
</html>
