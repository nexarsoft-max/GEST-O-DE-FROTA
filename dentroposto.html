<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<title>Postos</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<style>
*{box-sizing:border-box;font-family:Arial}
body{background:#f3f4f6;margin:0}
.header{height:70px;background:linear-gradient(90deg,#6f2cff,#9b5cff);display:flex;align-items:center;padding:0 24px;color:#fff}
.back{width:40px;height:40px;border-radius:12px;background:rgba(255,255,255,.15);border:none;color:#fff;font-size:22px;cursor:pointer}
.container{padding:40px;display:grid;grid-template-columns:repeat(auto-fill,minmax(280px,1fr));gap:24px}
.card{background:#fff;border-radius:18px;padding:24px;box-shadow:0 12px 28px rgba(0,0,0,.08)}
.vazio{text-align:center;color:#666;grid-column:1/-1}
.btn{flex:1;height:42px;border-radius:12px;border:none;cursor:pointer;background:#8b1cf6;color:#fff}
</style>
</head>
<body>

<header class="header">
  <!-- ✅ SEM url_for pra não dar BuildError -->
  <button class="back" type="button" onclick="location.assign('/geralinformacao')">←</button>
  <h1 style="margin-left:16px">Postos</h1>
</header>

<main class="container" id="lista"></main>

<script>
function precoDo(p, tipo){
  const alvo = String(tipo || "").toLowerCase().trim();

  if (Array.isArray(p.combustiveis)) {
    const item = p.combustiveis.find(c => String(c.tipo||"").toLowerCase().trim() === alvo);
    return item ? Number(item.preco || 0).toFixed(2) : "0.00";
  }

  // fallback se um dia vier direto
  if (alvo === "gasolina") return Number(p.gasolina || 0).toFixed(2);
  if (alvo === "etanol") return Number(p.etanol || 0).toFixed(2);
  if (alvo === "diesel") return Number(p.diesel || 0).toFixed(2);
  return "0.00";
}

async function carregar(){
  const container = document.getElementById("lista");
  container.innerHTML = "";

  try{
    const resp = await fetch("/api/postos", { headers: { "Accept":"application/json" } });
    const data = await resp.json().catch(()=> ([]));

    if(resp.status === 401){
      alert("Sua sessão expirou. Faça login novamente.");
      location.assign("/");
      return;
    }

    if(!resp.ok){
      container.innerHTML = `<div class="vazio">Erro ao carregar postos</div>`;
      return;
    }

    if(!Array.isArray(data) || data.length === 0){
      container.innerHTML = `<div class="vazio">Nenhum posto cadastrado</div>`;
      return;
    }

    data.forEach(p=>{
      const div = document.createElement("div");
      div.className = "card";
      div.innerHTML = `
        <h3>${p.nome || ""}</h3>
        <p>${p.endereco || ""}</p>
        <p>Gasolina: R$ ${precoDo(p,"gasolina")}</p>
        <p>Etanol: R$ ${precoDo(p,"etanol")}</p>
        <p>Diesel: R$ ${precoDo(p,"diesel")}</p>

        <div style="margin-top:14px; display:flex; gap:10px;">
          <button class="btn" onclick="location.assign('/editarposto/${p.id}')">Editar</button>
        </div>
      `;
      container.appendChild(div);
    });

  }catch(e){
    console.error(e);
    container.innerHTML = `<div class="vazio">Erro ao carregar postos</div>`;
  }
}

carregar();
</script>

</body>
</html>
