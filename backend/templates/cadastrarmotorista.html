<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<title>Cadastrar Motorista</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<style>
*{box-sizing:border-box;font-family:Arial, Helvetica, sans-serif;}
body{background:#f3f4f6;margin:0;}
.card{max-width:700px;margin:40px auto;background:#fff;border-radius:16px;box-shadow:0 10px 25px rgba(0,0,0,.08);overflow:hidden;}
.card-header{background:linear-gradient(90deg,#6f2cff,#9b5cff);color:#fff;padding:18px 24px;display:flex;align-items:center;gap:14px;}
.back-btn{width:40px;height:40px;border-radius:12px;background:rgba(255,255,255,.15);border:none;color:#fff;font-size:22px;cursor:pointer;}
.card-body{padding:28px;}
.form-group{display:flex;flex-direction:column;gap:6px;margin-bottom:18px;}
label{font-size:14px;font-weight:600;color:#374151;}
input{height:44px;border-radius:10px;border:1px solid #e5e7eb;padding:0 14px;font-size:14px;}
input:focus{outline:none;border-color:#8b1cf6;box-shadow:0 0 0 2px rgba(139,28,246,.15);}
.form-grid{display:grid;grid-template-columns:1fr 1fr;gap:18px;}
.full{grid-column:span 2;}
.actions{margin-top:28px;}
button{width:100%;height:48px;border-radius:12px;border:none;cursor:pointer;font-size:15px;font-weight:600;background:#8b1cf6;color:#fff;}
</style>
</head>

<body>
<div class="card">
  <div class="card-header">
    <button class="back-btn" type="button" onclick="location.assign('/cadastro')">←</button>
    <strong>Cadastrar Motorista</strong>
  </div>

  <div class="card-body">
    <div class="form-grid">
      <div class="form-group">
        <label>Nome completo *</label>
        <input id="nome" placeholder="Nome do motorista">
      </div>

      <div class="form-group">
        <label>CPF *</label>
        <input id="cpf" placeholder="000.000.000-00">
      </div>

      <div class="form-group">
        <label>Data de nascimento</label>
        <input id="nascimento" type="date">
      </div>

      <div class="form-group full">
        <label>Endereço *</label>
        <input id="endereco" placeholder="Endereço completo">
      </div>

      <div class="actions full">
        <button type="button" onclick="cadastrarMotorista()">Cadastrar Motorista</button>
      </div>
    </div>
  </div>
</div>

<script>
async function cadastrarMotorista(){
  const nome = document.getElementById("nome").value.trim();
  const cpf = document.getElementById("cpf").value.trim();
  const nascimento = document.getElementById("nascimento").value;
  const endereco = document.getElementById("endereco").value.trim();

  if(!nome || !cpf || !endereco){
    alert("Preencha Nome, CPF e Endereço.");
    return;
  }

  try{
    const resp = await fetch("/api/motoristas", {
      method: "POST",
      headers: {
        "Content-Type":"application/json",
        "Accept":"application/json"
      },
      body: JSON.stringify({ nome, cpf, nascimento, endereco })
    });

    const data = await resp.json().catch(()=> ({}));

    if(resp.status === 401){
      alert("Sua sessão expirou. Faça login novamente.");
      location.assign("/");
      return;
    }

    if(!resp.ok){
      alert(data.erro || `Erro ao cadastrar motorista (HTTP ${resp.status})`);
      return;
    }

    alert("Motorista cadastrado!");
    // vai para a listagem
    window.location.assign("/dentromotorista");

  }catch(err){
    console.error(err);
    alert("Erro de conexão com o servidor");
  }
}
window.cadastrarMotorista = cadastrarMotorista;
</script>

</body>
</html>
