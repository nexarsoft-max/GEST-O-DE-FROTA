<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<title>Editar Motorista</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
*{box-sizing:border-box;font-family:Arial,Helvetica,sans-serif;}
body{background:#f3f4f6;margin:0;}
.card{max-width:700px;margin:40px auto;background:#fff;border-radius:16px;box-shadow:0 10px 25px rgba(0,0,0,.08);overflow:hidden;}
.card-header{background:linear-gradient(90deg,#6f2cff,#9b5cff);color:white;padding:18px 24px;display:flex;gap:14px;align-items:center;}
.back-btn{width:40px;height:40px;border-radius:12px;background:rgba(255,255,255,.15);border:none;color:white;font-size:22px;cursor:pointer;}
.card-body{padding:28px;}
.form-group{display:flex;flex-direction:column;gap:6px;margin-bottom:18px;}
label{font-size:14px;font-weight:600;color:#374151;}
input{height:44px;border-radius:10px;border:1px solid #e5e7eb;padding:0 14px;font-size:14px;}
input:focus{outline:none;border-color:#8b1cf6;box-shadow:0 0 0 2px rgba(139,28,246,.15);}
.form-grid{display:grid;grid-template-columns:1fr 1fr;gap:18px;}
.full{grid-column:span 2;}
.actions{display:flex;gap:12px;margin-top:28px;}
.btn{flex:1;height:48px;border-radius:12px;border:none;cursor:pointer;color:white;font-size:15px;font-weight:600;}
.salvar{background:#8b1cf6;}
.excluir{background:#dc2626;}

/* UPLOAD CNH */
.upload-box{
  border:2px dashed #cfcfe6;
  border-radius:14px;
  padding:16px;
  text-align:center;
  background:#faf9ff;
  cursor:pointer;
}
.upload-box input{display:none;}
.upload-box span{font-size:14px;color:#6b7280;}
.upload-box img{max-width:100%;margin-top:12px;border-radius:10px;}
</style>
</head>

<body>

<div class="card">
  <div class="card-header">
    <button class="back-btn" onclick="window.location.href='dentromotorista.html'">←</button>
    <strong>Editar Motorista</strong>
  </div>

  <div class="card-body">
    <div class="form-grid">
      <div class="form-group">
        <label>Nome completo *</label>
        <input id="nome">
      </div>

      <div class="form-group">
        <label>CPF *</label>
        <input id="cpf">
      </div>

      <div class="form-group">
        <label>Data de nascimento</label>
        <input id="nascimento" type="date">
      </div>

      <div class="form-group full">
        <label>Endereço *</label>
        <input id="endereco">
      </div>

      <!-- CNH Frente -->
      <div class="form-group full">
        <label>CNH - Frente</label>
        <label class="upload-box">
          <span>Clique para anexar a CNH (frente)</span>
          <input type="file" accept="image/*" id="cnhFrente">
          <img id="previewFrente">
        </label>
      </div>

      <!-- CNH Verso -->
      <div class="form-group full">
        <label>CNH - Verso</label>
        <label class="upload-box">
          <span>Clique para anexar a CNH (verso)</span>
          <input type="file" accept="image/*" id="cnhVerso">
          <img id="previewVerso">
        </label>
      </div>
    </div>

    <div class="actions">
      <button class="btn salvar" onclick="salvar()">Salvar</button>
      <button class="btn excluir" onclick="excluir()">Excluir</button>
    </div>
  </div>
</div>

<script>
const MOTORISTA_ID = Number("{{ motorista_id|int }}");

async function carregar(){
  const resp = await fetch(`/api/motoristas/${MOTORISTA_ID}`);
  const data = await resp.json().catch(()=> ({}));

  if(resp.status === 401){
    alert("Sessão expirada");
    location.assign("/");
    return;
  }

  if(!resp.ok){
    alert("Erro ao carregar motorista");
    history.back();
    return;
  }

  document.getElementById("nome").value = data.nome || "";
  document.getElementById("cpf").value = data.cpf || "";
  document.getElementById("nascimento").value = data.nascimento || "";
  document.getElementById("endereco").value = data.endereco || "";
}

async function salvar(){
  const nome = document.getElementById("nome").value.trim();
  const cpf = document.getElementById("cpf").value.trim();
  const nascimento = document.getElementById("nascimento").value;
  const endereco = document.getElementById("endereco").value.trim();

  const resp = await fetch(`/api/motoristas/${MOTORISTA_ID}`, {
    method: "PUT",
    headers: {"Content-Type":"application/json"},
    body: JSON.stringify({ nome, cpf, nascimento, endereco })
  });

  if(!resp.ok){
    alert("Erro ao salvar");
    return;
  }

  location.assign("/dentromotorista");
}

async function excluir(){
  if(!confirm("Excluir motorista?")) return;

  const resp = await fetch(`/api/motoristas/${MOTORISTA_ID}`, {
    method: "DELETE"
  });

  if(!resp.ok){
    alert("Erro ao excluir");
    return;
  }

  location.assign("/dentromotorista");
}

carregar();
</script>


</body>
</html>
